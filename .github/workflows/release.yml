name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            xdg-utils \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: release_version
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 --manifest-path src-tauri/Cargo.toml | node -e "const fs = require('fs'); const metadata = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(metadata.packages[0].version)")"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Release tag ${tag} already exists. Bump src-tauri/Cargo.toml version before releasing again."
            exit 1
          fi

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build AppImage
        run: bun run tauri build --bundles appimage

      - name: Prepare release notes
        run: |
          set -euo pipefail
          version="${{ steps.release_version.outputs.version }}"

          awk -v version="$version" '
            BEGIN { capture = 0; found = 0 }
            /^## \[/ {
              if (capture) {
                exit
              }
              capture = ($0 ~ ("^## \\[" version "\\]"))
              if (capture) {
                found = 1
                next
              }
            }
            capture { print }
            END {
              if (!found) {
                exit 42
              }
            }
          ' CHANGELOG.md > RELEASE_NOTES.md || {
            printf "未找到版本 %s 的 CHANGELOG 条目，以下为完整 CHANGELOG：\n\n" "$version" > RELEASE_NOTES.md
            cat CHANGELOG.md >> RELEASE_NOTES.md
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          files: src-tauri/target/release/bundle/appimage/*.AppImage
